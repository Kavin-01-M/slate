spring.application.name=slate-classroom-backend

# ---- MySQL ----
# Reads from environment variables when set (used in cloud deployment),
# falls back to local defaults for running on your own machine.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/slate_classroom?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

# ---- JWT ----
# 256-bit+ secret — set JWT_SECRET as an environment variable in production,
# never commit a real production secret here.
app.jwt.secret=${JWT_SECRET:slate-classroom-super-secret-key-change-me-in-production-minimum-256-bits}
app.jwt.expiration-ms=86400000