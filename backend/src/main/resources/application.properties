spring.application.name=slate-classroom-backend

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/slate_classroom?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

# ---- JWT ----
# 256-bit+ secret, change this in production and load from an env var instead
app.jwt.secret=slate-classroom-super-secret-key-change-me-in-production-minimum-256-bits
app.jwt.expiration-ms=86400000